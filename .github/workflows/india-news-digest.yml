name: India Markets Digest - Morning

on:
  schedule:
    - cron: "30 1 * * *"   # 07:00 IST
  workflow_dispatch: {}

permissions:
  contents: write   # needed to commit today's predictions file back to the repo

jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run morning digest
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python india_news_digest.py

      - name: Commit today's predictions
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add predictions/
          git diff --staged --quiet || git commit -m "Predictions for $(date -u +%F)"
          git push
